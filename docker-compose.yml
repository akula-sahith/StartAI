services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: startup_os
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8007:8000"
    depends_on:
      - postgres
    env_file:
      - .env